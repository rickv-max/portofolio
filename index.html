<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- ==========================================
         🚀 PRIMARY META TAGS (Pencarian Google)
         ========================================== -->
    <title>Ricky Maulana- Web Developer & Software Engineer Portfolio</title>
    <meta name="title" content="Ricky - Web Developer & Software Engineer Portfolio" />
    <meta name="description" content="Halo, saya Ricky! Saya adalah seorang Web Developer yang antusias dalam membangun aplikasi web modern, responsif, dan performa tinggi menggunakan React, Tailwind CSS, dan teknologi terkini. Lihat karya-karya terbaik saya di sini." />
    <!-- Keywords yang sering dicari HRD/Klien (Sesuaikan dengan skill Anda) -->
    <meta name="keywords" content="Ricky Maulana, portfolio ricky, web developer indonesia, frontend developer, react developer, programmer, jasa pembuatan website, ricky developer, software engineer" />
    <meta name="author" content="Ricky" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Indonesian" />
    <meta name="revisit-after" content="3 days" />
    
    <!-- Warna address bar di HP (Bisa ganti warna sesuai tema portfolio Anda, misal biru/hitam) -->
    <meta name="theme-color" content="#111827" />

    <!-- ==========================================
         📱 OPEN GRAPH / FACEBOOK / LINKEDIN / WHATSAPP
         ========================================== -->
    <meta property="og:type" content="website" />
    <!-- GANTI INI DENGAN LINK VERCEL PORTFOLIO ANDA NANTI: -->
    <meta property="og:url" content="https://ricky-dev.vercel.app/" /> 
    <meta property="og:title" content="Ricky | Portfolio - Kreatif & Modern Web Developer" />
    <meta property="og:description" content="Jelajahi proyek-proyek terbaru saya. Mari berkolaborasi dan wujudkan ide gila Anda menjadi produk digital yang nyata!" />
    
    <!-- SAYA BERI GAMBAR PLACEHOLDER BERUPA SETUP MEJA KERJA PROGRAMMER.
         Nanti wajib diganti! Masukkan foto diri Anda atau screenshot Web Anda 
         berukuran 1200x630 ke folder 'public', lalu ganti link di bawah ini. -->
    <meta property="og:image" content="og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Ricky's Portfolio" />

    <!-- ==========================================
         🐦 TWITTER CARDS
         ========================================== -->
    <meta property="twitter:card" content="summary_large_image" />
    <!-- GANTI INI DENGAN LINK VERCEL PORTFOLIO ANDA NANTI: -->
    <meta property="twitter:url" content="https://ricky-dev.vercel.app/" />
    <meta property="twitter:title" content="Ricky Maulana | Portfolio - Kreatif & Modern Web Developer" />
    <meta property="twitter:description" content="Jelajahi proyek-proyek terbaru saya. Mari berkolaborasi dan wujudkan ide gila Anda menjadi produk digital yang nyata!" />
    <meta property="twitter:image" content="og-image.jpg" />

    <!-- ==========================================
         🌍 CANONICAL & GEO TAGS
         ========================================== -->
    <!-- GANTI INI DENGAN LINK VERCEL PORTFOLIO ANDA NANTI: -->
    <link rel="canonical" href="https://ricky-dev.vercel.app/" />
    <meta name="geo.region" content="ID" />
    <meta name="geo.placename" content="Indonesia" />

    <!-- DNS Prefetch (Mempercepat loading jika ambil font/gambar dari luar) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Fallback jika user mematikan JavaScript (Penting untuk SEO) -->
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: sans-serif">
        <h1>JavaScript Wajib Aktif</h1>
        <p>Aplikasi portofolio ini dibangun menggunakan React modern. Mohon aktifkan JavaScript di browser Anda untuk melihat pengalaman penuh.</p>
      </div>
    </noscript>
  </body>
</html>
